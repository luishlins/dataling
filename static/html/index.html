<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DataLing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* ─── Design Tokens ─────────────────────────────────────── */
    :root {
      --bg:           #F7F5F0;
      --surface:      #FFFFFF;
      --border:       #E2DDD6;
      --text-primary: #1A1714;
      --text-secondary: #6B6560;
      --text-muted:   #A09890;
      --accent:       #2D5BE3;
      --accent-hover: #1A3FB0;
      --accent-light: #EEF2FD;
      --danger:       #C0392B;
      --success:      #1E7E5E;

      --font-display: 'DM Serif Display', Georgia, serif;
      --font-body:    'DM Sans', sans-serif;
      --font-mono:    'DM Mono', 'Courier New', monospace;

      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 16px;

      --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md: 0 4px 16px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);

      --header-h: 64px;
      --sidebar-w: 220px;
      --content-max: 1100px;

      --transition: 150ms ease;
    }

    /* ─── Reset ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-font-smoothing: antialiased; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; border: none; background: none; font: inherit; }

    /* ─── Header ─────────────────────────────────────────────── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 32px;
      gap: 40px;
      z-index: 100;
      box-shadow: var(--shadow-sm);
    }

    .logo {
      display: flex;
      align-items: baseline;
      gap: 2px;
      flex-shrink: 0;
    }
    .logo-word {
      font-family: var(--font-display);
      font-size: 1.5rem;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }
    .logo-word em {
      font-style: italic;
      color: var(--accent);
    }
    .logo-tag {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-left: 6px;
      padding: 2px 6px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      align-self: center;
    }

    /* ─── Nav ────────────────────────────────────────────────── */
    nav {
      display: flex;
      align-items: center;
      gap: 4px;
      flex: 1;
    }

    nav a {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-secondary);
      padding: 6px 14px;
      border-radius: var(--radius-md);
      transition: color var(--transition), background var(--transition);
      display: flex;
      align-items: center;
      gap: 7px;
    }
    nav a:hover {
      color: var(--text-primary);
      background: var(--bg);
    }
    nav a.active {
      color: var(--accent);
      background: var(--accent-light);
    }
    nav a .nav-icon {
      width: 16px;
      height: 16px;
      opacity: 0.7;
    }
    nav a.active .nav-icon { opacity: 1; }

    /* ─── Header right ───────────────────────────────────────── */
    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .status-dot {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--text-muted);
    }
    .status-dot::before {
      content: '';
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 0 2px rgba(30,126,94,.2);
      animation: pulse 2.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 2px rgba(30,126,94,.2); }
      50%       { box-shadow: 0 0 0 5px rgba(30,126,94,.0); }
    }

    /* ─── Layout ─────────────────────────────────────────────── */
    .app-shell {
      padding-top: var(--header-h);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .page-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 28px 40px 24px;
    }
    .page-header-inner {
      max-width: var(--content-max);
      margin: 0 auto;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
    }
    .page-title {
      font-family: var(--font-display);
      font-size: 2rem;
      line-height: 1.1;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }
    .page-subtitle {
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-top: 4px;
      font-weight: 300;
    }

    /* ─── Main content ───────────────────────────────────────── */
    #main-content {
      flex: 1;
      max-width: var(--content-max);
      width: 100%;
      margin: 0 auto;
      padding: 36px 40px;
    }

    /* ─── Loading state ──────────────────────────────────────── */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      min-height: 320px;
      color: var(--text-muted);
    }
    .spinner {
      width: 32px; height: 32px;
      border: 2.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-state p {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      letter-spacing: 0.05em;
    }

    /* ─── Empty state ────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 80px 24px;
      color: var(--text-muted);
    }
    .empty-state .empty-icon {
      font-size: 2.5rem;
      margin-bottom: 16px;
      opacity: 0.4;
    }
    .empty-state h3 {
      font-family: var(--font-display);
      font-size: 1.25rem;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .empty-state p {
      font-size: 0.875rem;
      max-width: 320px;
      margin: 0 auto;
    }

    /* ─── Error state ────────────────────────────────────────── */
    .error-state {
      background: #FEF2F2;
      border: 1px solid #FECACA;
      border-radius: var(--radius-md);
      padding: 20px 24px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      max-width: 560px;
    }
    .error-state .error-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }
    .error-state .error-title {
      font-weight: 500;
      font-size: 0.875rem;
      color: var(--danger);
      margin-bottom: 4px;
    }
    .error-state .error-msg {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: #991B1B;
    }

    /* ─── Card grid (shared util) ────────────────────────────── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px 24px;
      box-shadow: var(--shadow-sm);
      transition: box-shadow var(--transition), transform var(--transition);
      cursor: default;
    }
    .card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }
    .card-label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .card-title {
      font-family: var(--font-display);
      font-size: 1.15rem;
      color: var(--text-primary);
      margin-bottom: 12px;
    }
    .card-meta {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .card-meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }
    .card-meta-row span:last-child {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-primary);
    }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 100px;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .badge-blue   { background: var(--accent-light); color: var(--accent); }
    .badge-green  { background: #ECFDF5; color: var(--success); }
    .badge-gray   { background: var(--bg); color: var(--text-muted); border: 1px solid var(--border); }

    /* ─── Button ─────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      font-weight: 500;
      transition: background var(--transition), transform var(--transition);
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--bg); color: var(--text-primary); }

    /* ─── Page-enter animation ───────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .page-enter {
      animation: fadeUp 0.3s ease forwards;
    }

    /* ─── Responsive ─────────────────────────────────────────── */
    @media (max-width: 680px) {
      header { padding: 0 16px; gap: 16px; }
      nav a span { display: none; }
      #main-content { padding: 24px 16px; }
      .page-header { padding: 20px 16px 16px; }
    }
  </style>
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────────── -->
  <header>
    <div class="logo">
      <span class="logo-word">Data<em>Ling</em></span>
      <span class="logo-tag">beta</span>
    </div>

    <nav id="main-nav">
      <a href="#students" data-page="students">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <span>Students</span>
      </a>
      <a href="#reporting" data-page="reporting">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/>
        </svg>
        <span>Reporting</span>
      </a>
      <a href="#advising" data-page="advising">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span>Advising</span>
      </a>
      <a href="#testing" data-page="testing">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 11 12 14 22 4"/>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
        </svg>
        <span>Testing</span>
      </a>
      <a href="#analytics" data-page="analytics">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        <span>Analytics</span>
      </a>
    </nav>

    <div class="header-right">
      <span class="status-dot">API online</span>
    </div>
  </header>

  <!-- ── App shell ────────────────────────────────────────────── -->
  <div class="app-shell">

    <div class="page-header">
      <div class="page-header-inner">
        <div>
          <h1 class="page-title" id="page-title">Students</h1>
          <p class="page-subtitle" id="page-subtitle">Manage learner profiles and track progress</p>
        </div>
        <div id="page-actions"></div>
      </div>
    </div>

    <main id="main-content">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Loading module…</p>
      </div>
    </main>

  </div>

  <!-- ── Router ───────────────────────────────────────────────── -->
  <script type="module">
    const PAGES = {
      students: {
        title: "Students",
        subtitle: "Manage learner profiles and track progress",
        module: "/static/js/students.js",
      },
      reporting: {
        title: "Reporting",
        subtitle: "Analyse performance data across cohorts",
        module: "/static/js/reporting.js",
      },
      advising: {
        title: "Advising",
        subtitle: "Vocabulary and skill recommendations",
        module: "/static/js/advising.js",
      },
      testing: {
        title: "Testing",
        subtitle: "Administer and review diagnostic tests",
        module: "/static/js/testing.js",
      },
      analytics: {
        title: "Analytics",
        subtitle: "Class-level insights — level distribution, gaps, progress, and inactivity",
        module: "/static/js/analytics.js",
      },
    };

    const mainContent  = document.getElementById("main-content");
    const pageTitle    = document.getElementById("page-title");
    const pageSubtitle = document.getElementById("page-subtitle");
    const pageActions  = document.getElementById("page-actions");
    const navLinks     = document.querySelectorAll("nav a[data-page]");

    function currentPage() {
      const hash = location.hash.replace("#", "").split("/")[0];
      return PAGES[hash] ? hash : "students";
    }

    function setActive(page) {
      navLinks.forEach(a => {
        a.classList.toggle("active", a.dataset.page === page);
      });
    }

    function showLoading() {
      mainContent.innerHTML = `
        <div class="loading-state">
          <div class="spinner"></div>
          <p>Loading module…</p>
        </div>`;
    }

    function showError(msg) {
      mainContent.innerHTML = `
        <div class="error-state">
          <span class="error-icon">⚠</span>
          <div>
            <div class="error-title">Failed to load module</div>
            <div class="error-msg">${msg}</div>
          </div>
        </div>`;
    }

    async function navigate() {
      const page   = currentPage();
      const config = PAGES[page];

      pageTitle.textContent    = config.title;
      pageSubtitle.textContent = config.subtitle;
      pageActions.innerHTML    = "";
      setActive(page);
      showLoading();

      try {
        const mod = await import(config.module);
        mainContent.innerHTML = "";
        mainContent.classList.remove("page-enter");
        void mainContent.offsetWidth;
        mainContent.classList.add("page-enter");
        mod.default(mainContent, pageActions);
      } catch (err) {
        showError(err.message);
      }
    }

    if (!location.hash) history.replaceState(null, "", "#students");

    window.addEventListener("hashchange", navigate);
    navigate();
  </script>

</body>
</html>
